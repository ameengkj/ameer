<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ملعب فلسطين | متابعة الطلاب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] font-['Cairo'] antialiased">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-[#FF6B00] rounded-2xl flex items-center justify-center shadow-lg shadow-orange-200">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-[#0F172A]">ملعب فلسطين</h1>
            </div>

            <div id="auth-actions">
                <button onclick="app.showLogin()" class="flex items-center gap-2 text-gray-500 hover:text-[#FF6B00] font-semibold transition-colors">
                    <i data-lucide="lock" class="w-4 h-4"></i>
                    <span>بوابة المحفظ</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Content Area -->
    <main id="app-container" class="max-w-5xl mx-auto px-6 py-12">
        <!-- Dynamic content injected here -->
    </main>

    <!-- Notification Toast -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
